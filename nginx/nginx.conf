    server {
        listen 80;

        #for multiple backend servers, we can define an upstream block and use it in the proxy_pass directive
        #upstream backend_upstream {
        #server backend:8080;
   # }

        location / {
            proxy_pass http://backend:8080;

            #[X] Set headers to pass the original host and client IP information to the backend

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            
        }
    }

