services:
  backend:
    build: ./backend

    #[x] container for the backend, container name"app_backend"
    container_name: ${BACKEND_NAME}
    networks:
      - app_network
    #[x] add healthcheck to the backend service
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
   

  nginx:
    image: nginx:alpine

    #[x]container for the nginx, container name"app_nginx"
    container_name: ${NGINX_NAME}
    ports:
      - "80:80"
    volumes:

    #[x] mount the nginx configuration file to the container (read-only)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

      #[x] mount the static files from the backend to nginx
    depends_on:
      - backend
    networks:
      - app_network
    #[x] отдельная internal network for the services to communicate with each other
networks:
  app_network:
    driver: bridge
