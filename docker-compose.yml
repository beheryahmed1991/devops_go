services:
  backend:
    build: ./backend

    #container for the backend service
    container_name: app_backend
    networks:
      - app_network
   

  nginx:
    image: nginx:alpine

    #container for the nginx server"name"
    container_name: app_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

      #mount the static files from the backend to nginx
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
