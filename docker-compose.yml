services:
  backend:
    build: ./backend

    #container for the backend, service name"app_backend"
    container_name: ${BACKEND_NAME}
    networks:
      - app_network
   

  nginx:
    image: nginx:alpine

    #container for the nginx, server name"app_nginx"
    container_name: ${NGINX_NAME}
    ports:
      - "80:80"
    volumes:

    # mount the nginx configuration file to the container (read-only)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

      #mount the static files from the backend to nginx
    depends_on:
      - backend
    networks:
      - app_network
# отдельная internal network for the services to communicate with each other
networks:
  app_network:
    driver: bridge
